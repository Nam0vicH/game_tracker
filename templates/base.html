<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3 Expressive Library</title>

    <!-- ico -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.svg') }}">

    <!-- Preconnect to Google Fonts (critical for speed) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Critical CSS inline for instant first paint -->
    <style>
        :root{--md-sys-color-surface:#0f0d13;--md-sys-color-on-surface:#e6e1e5;--font-family:'Roboto Flex',sans-serif}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background-color:var(--md-sys-color-surface);color:var(--md-sys-color-on-surface);font-family:var(--font-family);display:flex;min-height:100vh}
    </style>

    <!-- Theme script: inline to avoid render-blocking network request, runs before paint -->
    <script>{{ theme_js | safe }}</script>

    <!-- Google Fonts: Roboto Flex — limited weight range for smaller download -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400..700&display=swap" rel="stylesheet">

    <!-- Material Symbols: limited to used icons weight/fill range, loaded async -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400..700,0..1,0" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400..700,0..1,0" /></noscript>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}" media="(max-width: 768px)">
    {% block page_css %}{% endblock %}
</head>
<body>

<!-- Navigation Rail -->
    <nav class="nav-rail">
        <div class="nav-container">
            <!-- FAB Speed Dial Wrapper -->
            <div class="fab-wrapper" id="fabSpeedDial">

                <!-- Выпадающее меню (Pills) -->
                <div class="fab-options">
                    <!-- Опция 1: Add Game (Верхняя) -->
                    <button class="fab-pill" onclick="openAddGameModal()">
                        <span class="material-symbols-rounded">sports_esports</span>
                        <span class="label">Add Game</span>
                    </button>

                    <!-- Опция 2: Add Franchise (Нижняя) -->
                    <button class="fab-pill" onclick="openAddFranchiseModal()">
                        <span class="material-symbols-rounded">library_add</span>
                        <span class="label">Add Franchise</span>
                    </button>
                </div>

                <!-- Основная кнопка (Trigger) -->
                <button class="nav-fab" id="fabTrigger">
                    <span class="material-symbols-rounded">add</span>
                </button>
            </div>

            <div class="nav-group">

                <a href="{{ url_for('index') }}"
                   class="nav-item {{ 'active' if request.endpoint == 'index' else '' }}">
                    <span class="material-symbols-rounded icon">browse</span>
                    <span class="label">Library</span>
                </a>

                <a href="{{ url_for('journey') }}"
                   class="nav-item {{ 'active' if request.endpoint == 'journey' else '' }}">
                    <span class="material-symbols-rounded icon">analytics</span>
                    <span class="label">Stats</span>
                </a>

                <a href="{{ url_for('dashboard') }}"
                   class="nav-item {{ 'active' if request.path == '/dashboard' }}">
                    <span class="material-symbols-rounded icon">monitoring</span>
                    <span class="label">Dashboard</span>
                </a>

                <a href="{{ url_for('picker') }}"
                   class="nav-item {{ 'active' if request.endpoint == 'picker' else '' }}">
                    <span class="material-symbols-rounded icon">casino</span>
                    <span class="label">Picker</span>
                </a>

                <a href="{{ url_for('settings') }}"
                   class="nav-item {{ 'active' if request.endpoint == 'settings' else '' }}">
                    <span class="material-symbols-rounded icon">settings</span>
                    <span class="label">Settings</span>
                </a>
            </div>

            <div class="nav-footer">
                <button class="nav-icon-btn" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })" title="Up">
                    <span class="material-symbols-rounded">arrow_upward</span>
                </button>

                <button class="nav-icon-btn" onclick="window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })" title="Down">
                    <span class="material-symbols-rounded">arrow_downward</span>
                </button>
            </div>

        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    {% block page_js %}{% endblock %}
</body>
</html>
