{% extends "base.html" %}

{% block page_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
{% endblock %}

{% block content %}
<div class="settings-container">
    <h1>Внешность</h1>

    <div class="settings-grid">
        
        <!-- Card 1: Theme Presets -->
        <article class="settings-card">
            <div class="card-header">
                <h2>Color Scheme</h2>
                <p>Pick a preset palette</p>
            </div>
            <div class="swatch-grid">
                <!-- Inline styles moved to CSS using [data-theme] selectors -->
                <div class="theme-swatch active" data-theme="violet" title="Deep Violet"></div>
                <div class="theme-swatch" data-theme="ocean" title="Ocean Blue"></div>
                <div class="theme-swatch" data-theme="emerald" title="Emerald Nature"></div>
                <div class="theme-swatch" data-theme="volcanic" title="Volcanic Red"></div>
            </div>
        </article>

        <!-- Card 2: Custom -->
        <article class="settings-card">
            <div class="card-header">
                <h2>Custom Accent</h2>
                <p>Generate a theme from a single color</p>
            </div>
            <div class="color-picker-wrapper">
                <input type="color" id="customColorInput" value="#d0bcff">
                <!-- Inline styles moved to #hexValueLabel in CSS -->
                <span id="hexValueLabel">#D0BCFF</span>
            </div>
        </article>

        <!-- Card 3: Background Mode -->
        <article class="settings-card">
            <div class="card-header">
                <h2>Background Depth</h2>
                <p>Adjust dark mode contrast</p>
            </div>
            <div class="segmented-group">
                <button class="segment-btn" data-bg="oled">
                    <span class="material-symbols-rounded">check</span> OLED
                </button>
                <button class="segment-btn active" data-bg="default">
                    <span class="material-symbols-rounded">check</span> Default
                </button>
                <button class="segment-btn" data-bg="soft">
                    <span class="material-symbols-rounded">check</span> Soft
                </button>
            </div>
        </article>

    </div>
</div>

<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
